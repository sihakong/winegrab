<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>공 튀기기 - 시스템 예시</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <main class="scene" aria-label="공이 바닥에서 튀는 애니메이션">
        <div class="header">
          <h1 class="title">공 튀기기</h1>
          <span class="badge">system sample</span>
        </div>
        <div class="body">
          <p class="description">이 화면은 같은 디자인 시스템으로 만든 예시 페이지입니다.</p>
          <div class="stage">
            <div class="floor" aria-hidden="true"></div>
            <div class="ball-wrap" aria-hidden="true">
              <div class="shadow"></div>
              <div class="ball"></div>
            </div>
          </div>
        </div>
        <div class="footer">
          <p class="hint">이제부터 새 화면도 같은 토큰과 규칙을 씁니다.</p>
          <span class="chip">soft bg / point yellow / ink text</span>
        </div>
      </main>
    </div>
  </body>
</html>
