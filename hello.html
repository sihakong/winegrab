<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>공 튀기기</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <main class="scene" aria-label="공이 바닥에서 튀는 애니메이션">
        <div class="header">
          <h1 class="title">공 튀기기</h1>
          <span class="badge">same system</span>
        </div>
        <div class="body">
          <p class="description">같은 디자인 시스템을 재사용한 두 번째 화면입니다.</p>
          <div class="stage">
            <div class="floor" aria-hidden="true"></div>
            <div class="ball-wrap" aria-hidden="true">
              <div class="shadow"></div>
              <div class="ball"></div>
            </div>
          </div>
        </div>
        <div class="footer">
          <p class="hint">앞으로도 이 규칙을 기준으로 진행합니다.</p>
          <span class="chip">mobile-first / 480px column</span>
        </div>
      </main>
    </div>
  </body>
</html>
